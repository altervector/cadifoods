<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
    <script>
        async function gestionarSwitch() {
            try {
                const resposta = await fetch("/.netlify/functions/get-switch");
                const dades = await resposta.json();
                const registre = dades.records[0];
                
                const estaActiu = registre.fields.status === true; 
                const arxiuDesti = registre.fields.nom_arxiu; 

                if (estaActiu && arxiuDesti) {
                    window.location.href = arxiuDesti;
                } else {
                    mostrar404();
                }
            } catch (error) {
                console.error("Error:", error);
                mostrar404();
            }
        }

        function mostrar404() {
            // Cridem al fitxer extern de GitHub per pintar l'error
            const script = document.createElement('script');
            script.src = "https://altervector.github.io/cadinamics/error.js";
            document.head.appendChild(script);
        }

        gestionarSwitch();
    </script>
</body>
</html>
