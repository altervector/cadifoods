<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
    <script>
        async function gestionarSwitch() {
            try {
                // Truquem a la funció que hem creat a Netlify
                const resposta = await fetch("/.netlify/functions/get-switch");
                const dades = await resposta.json();

                // Agafem el primer registre de la taula 'switch'
                const registre = dades.records[0];
                
                // Mirem si el checkbox 'status' està marcat
                const estaActiu = registre.fields.status === true; 
                // Agafem el nom del fitxer de la columna (ajusta el nom si cal)
                const arxiuDesti = registre.fields.nom_arxiu; 

                if (estaActiu && arxiuDesti) {
                    window.location.href = arxiuDesti;
                } else {
                    mostrar404();
                }
            } catch (error) {
                console.error("Error:", error);
                mostrar404();
            }
        }

        function mostrar404() {
            document.title = "404 Not Found";
            document.body.innerHTML = '<img src="https://raw.githubusercontent.com/altervector/cadinamics/main/Icon/404.png" style="max-width:100%; height:auto;">';
        }

        gestionarSwitch();
    </script>
</body>
</html>
